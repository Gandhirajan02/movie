<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leo Movie Poster</title>

<style>
*{
    margin:0;
    padding:0;
    font-family:Arial, sans-serif;
}

body{
    background:#222;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.poster{
    width:320px;
    background:#111;
    color:white;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 0 15px gray;
}

.poster img{
    width:100%;
    height:420px;
    object-fit:cover;
}

.content{
    padding:15px;
    text-align:center;
}

h1{
    color:gold;
    margin-bottom:10px;
}

p{
    margin:8px 0;
    font-size:15px;
}

button{
    margin-top:15px;
    padding:10px 20px;
    border:none;
    background:red;
    color:white;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:darkred;
}
</style>

</head>
<body>

<div class="poster">

    <!-- Replace this image with any Leo movie poster -->
    <img src="leoooo.jpg" alt="Leo Movie Poster">

    <div class="content">
        <h1>LEO</h1>

        <p><strong>Hero:</strong> Vijay</p>

        <p><strong>Director:</strong> Lokesh Kanagaraj</p>

        <p><strong>Genre:</strong> Action / Thriller</p>

        <p><strong>Release:</strong> 19 October 2023</p>

        <button>Watch Trailer</button>
    </div>

</div>

</body>
</html>
